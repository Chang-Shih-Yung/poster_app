name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

  # Read-only black-box suite against live Supabase. Verifies the
  # bot-seed fixture + every RPC that powers a home-surface is
  # returning the shapes the Flutter client expects.
  #
  # Anon key only — same privilege level as an unauthed browser
  # visitor. Cannot mutate prod data. A failure here means the
  # discovery / social graph contract drifted, not that a deploy
  # broke anything writable.
  #
  # Secrets required at repo level (Settings → Secrets and variables
  # → Actions):
  #   · SUPABASE_URL
  #   · SUPABASE_ANON_KEY
  integration:
    name: integration tests (read-path)
    runs-on: ubuntu-latest
    # Don't block merges on integration-suite flakes — `flutter`
    # job above is the hard gate. This job surfaces contract drift
    # but failures here are typically actionable follow-ups, not
    # showstoppers.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run bot-flow integration suite
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 scripts/tests/bot_flows_test.py
